version: '3.9'

services:
  web:
    build: .
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db/ghosttunn
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: replace-with-production-secret
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ghosttunn
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--save", "900", "1"]

volumes:
  pgdata:
